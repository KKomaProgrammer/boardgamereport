<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>영상 편집 · BoardLab Studio</title>
  <meta name="description" content="보드게임부 발표 제작 협업 플랫폼 BoardLab Studio" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js" defer></script>
  <script src="/assets/js/app.js" defer></script>
</head>
<body data-page="video">
  <div class="topbar"><a class="brand" href="/"><span class="brand-mark">▣</span><span>BoardLab Studio</span></a><nav class="topnav"><a href="/dashboard/">대시보드</a><a href="/notifications/">알림<span class="dot" data-notif-dot hidden></span></a><a href="/settings/account/">설정</a></nav><button class="ghost small" data-action="logout" hidden>로그아웃</button></div>
  <main class="page-shell">
    <section class="page-title"><span class="eyebrow">영상 편집</span><h1 data-project-title>프로젝트</h1><div class="tabs"><a class="tab" href="/project/">개요</a><a class="tab active" href="/project/video/">영상 편집</a><a class="tab" href="/project/ppt/">PPT 제작</a><a class="tab" href="/project/boardgame/">보드게임 제작</a><a class="tab" href="/project/team/">팀원</a><a class="tab" href="/project/share/">공유</a><span class="save-state" data-save-state data-state="saved">저장됨</span></div></section>
    <section class="workspace">
      <aside class="panel"><div class="row"><h2>장면</h2><button class="small" data-add-scene>추가</button></div><div data-scenes></div></aside>
      <section class="panel"><h2>프로그램형 영상 스튜디오</h2><canvas data-video-canvas width="1280" height="720" class="video-stage"></canvas><div class="row" style="margin-top:12px"><button data-preview-program-video>미리보기</button><button class="soft" data-render-program-video>업로드 없이 영상 저장</button></div><div data-program-video-result></div><hr style="border:0;border-top:1px solid var(--line);margin:18px 0"><h2>장면 편집</h2><div data-scene-editor></div><hr style="border:0;border-top:1px solid var(--line);margin:18px 0"><h2>업로드 영상 자르기</h2><div class="form"><input type="file" data-video-file><video data-video-preview controls style="width:100%;border-radius:18px;background:#000;margin-top:8px"></video><div class="grid two"><div class="field"><label>시작 초</label><input type="number" min="0" step="0.1" value="0" data-trim-start></div><div class="field"><label>끝 초</label><input type="number" min="0" step="0.1" value="10" data-trim-end></div></div><button data-export-video>구간 저장</button><div data-video-result></div></div></section>
      <aside class="panel"><h2>AI·팀 패널</h2><button class="soft" data-ai-video>대본 다듬기</button><div data-ai-result style="margin-top:12px"></div><hr style="border:0;border-top:1px solid var(--line);margin:16px 0"><p class="mini">업로드 없이도 장면 제목·화면 설명·대본을 바탕으로 영상을 생성합니다.</p></aside>
    </section>
  </main>
  <nav class="mobile-nav"><a href="/dashboard/">홈</a><a href="/project/">프로젝트</a><a href="/notifications/">알림<span class="dot" data-notif-dot hidden></span></a><a href="/settings/account/">설정</a></nav><div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
