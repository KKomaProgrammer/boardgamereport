<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PPT 제작 · BoardLab Studio</title>
  <meta name="description" content="보드게임부 발표 제작 협업 플랫폼 BoardLab Studio" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="/assets/js/app.js" defer></script>
</head>
<body data-page="ppt">
  <div class="topbar">
    <a class="brand" href="/" aria-label="BoardLab Studio 홈">
      <span class="brand-mark">▣</span><span>BoardLab Studio</span>
    </a>
    <nav class="topnav" aria-label="상단 메뉴">
      <a href="/dashboard/">대시보드</a>
      <a href="/notifications/" class="notif-link">알림<span class="dot" data-notif-dot hidden></span></a>
      <a href="/settings/account/">설정</a>
    </nav>
    <button class="ghost small" data-action="logout" hidden>로그아웃</button>
  </div>
  <main class="page-shell">

    <section class="page-title">
      <span class="eyebrow">PPT 제작</span><h1 data-project-title>프로젝트</h1>
      <div class="tabs">
        <a class="tab" data-tab="overview" href="/project/">개요</a>
        <a class="tab" data-tab="video_workspace" href="/project/video/">영상 제작<span data-tab-check="video_workspace"></span></a>
        <a class="tab" data-tab="ppt_workspace" href="/project/ppt/">PPT 제작<span data-tab-check="ppt_workspace"></span></a>
        <a class="tab" data-tab="boardgame_workspace" href="/project/boardgame/">보드게임 제작<span data-tab-check="boardgame_workspace"></span></a>
        <a class="tab" data-tab="team" href="/project/team/">팀원</a>
        <a class="tab" data-tab="share" href="/project/share/">공유</a>
        <span class="save-state" data-save-state data-state="saved">저장됨</span>
      </div>

    </section>
    <section class="workspace">
      <aside class="panel"><div class="row"><h2>슬라이드</h2><button class="small" data-add-slide>추가</button></div><div data-slides></div></aside>
      <section class="panel"><div class="toolbar"><select name="template"><option value="classic">클래식 발표형</option><option value="card">보드게임 카드형</option><option value="board">전략 게임판형</option><option value="black">미니멀 블랙형</option></select></div><div class="canvas slide-canvas" data-slide-canvas></div></section>
      <aside class="panel"><h2>발표자 노트</h2><textarea data-notes placeholder="발표할 때 읽을 메모"></textarea><button class="soft" data-ai-ppt style="margin-top:10px">발표 문장 다듬기</button><div data-ai-result style="margin-top:12px"></div></aside>
    </section>

  </main>
  <nav class="mobile-nav" aria-label="모바일 메뉴">
    <a href="/dashboard/">홈</a>
    <a href="/project/">프로젝트</a>
    <a href="/notifications/">알림<span class="dot" data-notif-dot hidden></span></a>
    <a href="/settings/account/">설정</a>
  </nav>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
