<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>닉네임 설정 · BoardLab Studio</title>
  <meta name="description" content="보드게임부 발표 제작 협업 플랫폼 BoardLab Studio" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="/assets/js/app.js" defer></script>
</head>
<body data-page="nickname">
  <div class="topbar">
    <a class="brand" href="/" aria-label="BoardLab Studio 홈">
      <span class="brand-mark">▣</span><span>BoardLab Studio</span>
    </a>
    <nav class="topnav" aria-label="상단 메뉴">
      <a href="/dashboard/">대시보드</a>
      <a href="/notifications/" class="notif-link">알림<span class="dot" data-notif-dot hidden></span></a>
      <a href="/settings/account/">설정</a>
    </nav>
    <button class="ghost small" data-action="logout" hidden>로그아웃</button>
  </div>
  <main class="page-shell">

    <section class="auth-wrap card">
      <span class="eyebrow">닉네임 설정</span>
      <h1>팀원이 찾을 이름</h1>
      <p class="muted">닉네임은 초대 검색에만 사용되고 이메일은 공개하지 않습니다.</p>
      <form class="form" data-nickname-form>
        <div class="field"><label>닉네임</label><input name="nickname" placeholder="예: 보드게임마스터" required></div>
        <div class="row"><button type="button" class="ghost" data-suggest-nick>보드랩학생</button><button type="button" class="ghost" data-suggest-nick>전략마스터</button><button type="submit">저장</button></div>
      </form>
    </section>

  </main>
  <nav class="mobile-nav" aria-label="모바일 메뉴">
    <a href="/dashboard/">홈</a>
    <a href="/project/">프로젝트</a>
    <a href="/notifications/">알림<span class="dot" data-notif-dot hidden></span></a>
    <a href="/settings/account/">설정</a>
  </nav>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
