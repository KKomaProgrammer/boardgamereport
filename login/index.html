<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 · BoardLab Studio</title>
  <meta name="description" content="보드게임부 발표 제작 협업 플랫폼 BoardLab Studio" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="/assets/js/app.js" defer></script>
</head>
<body data-page="login">
  <div class="topbar">
    <a class="brand" href="/" aria-label="BoardLab Studio 홈">
      <span class="brand-mark">▣</span><span>BoardLab Studio</span>
    </a>
    <nav class="topnav" aria-label="상단 메뉴">
      <a href="/dashboard/">대시보드</a>
      <a href="/notifications/" class="notif-link">알림<span class="dot" data-notif-dot hidden></span></a>
      <a href="/settings/account/">설정</a>
    </nav>
    <button class="ghost small" data-action="logout" hidden>로그아웃</button>
  </div>
  <main class="page-shell">
    <section class="auth-wrap card auth-card">
      <span class="eyebrow">로그인</span>
      <h1>작업실로 들어가기</h1>
      <p class="muted">Google 계정 또는 이메일/비밀번호로 로그인합니다.</p>
      <div class="form">
        <button class="secondary" data-google-login>Google로 로그인</button>
        <div class="notice" data-auth-warning hidden></div>
      </div>
      <hr style="border:0;border-top:1px solid var(--line);margin:20px 0">
      <form class="form" data-login-form>
        <div class="field"><label>이메일 또는 ID</label><input name="email" type="email" placeholder="student@example.com" required></div>
        <div class="field"><label>비밀번호</label><input name="password" type="password" placeholder="비밀번호" required></div>
        <button type="submit">로그인</button>
        <a class="mini" href="/signup/">계정이 없다면 가입하기</a>
      </form>
    </section>
  </main>
  <nav class="mobile-nav" aria-label="모바일 메뉴">
    <a href="/dashboard/">홈</a>
    <a href="/project/">프로젝트</a>
    <a href="/notifications/">알림<span class="dot" data-notif-dot hidden></span></a>
    <a href="/settings/account/">설정</a>
  </nav>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
