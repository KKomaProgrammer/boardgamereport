<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>홈 · BoardLab Studio</title>
  <meta name="description" content="보드게임부 발표 제작 협업 플랫폼 BoardLab Studio" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="/assets/js/app.js" defer></script>
</head>
<body data-page="landing">
  <div class="topbar">
    <a class="brand" href="/" aria-label="BoardLab Studio 홈">
      <span class="brand-mark">▣</span><span>BoardLab Studio</span>
    </a>
    <nav class="topnav" aria-label="상단 메뉴">
      <a href="/dashboard/">대시보드</a>
      <a href="/notifications/" class="notif-link">알림<span class="dot" data-notif-dot hidden></span></a>
      <a href="/settings/account/">설정</a>
    </nav>
    <button class="ghost small" data-action="logout" hidden>로그아웃</button>
  </div>
  <main class="page-shell">
    <section class="hero">
      <div>
        <span class="eyebrow">BoardLab Studio</span>
        <h1>영상 편집과 PPT 제작을 한 곳에서</h1>
        <p class="lead">직접 복잡한 편집 엔진을 만들지 않고, 검증된 브라우저 라이브러리를 활용해 영상 편집과 발표용 PPT 제작에 집중합니다.</p>
        <div class="hero-actions">
          <button data-start>시작하기</button>
          <a class="button ghost" href="/login/">로그인</a>
        </div>
      </div>
      <div class="grid two">
        <a class="card choice-card" href="/project/video/"><div><div class="icon">▶</div><h2>영상 편집</h2><p class="muted">FFmpeg.wasm 기반 영상 자르기와 파일 내보내기</p></div><b>영상 편집하기 →</b></a>
        <a class="card choice-card" href="/project/ppt/"><div><div class="icon">▣</div><h2>PPT 제작</h2><p class="muted">PptxGenJS 기반 슬라이드 제작과 PPTX 다운로드</p></div><b>PPT 만들기 →</b></a>
      </div>
    </section>
  </main>
  <nav class="mobile-nav" aria-label="모바일 메뉴">
    <a href="/dashboard/">홈</a>
    <a href="/project/">프로젝트</a>
    <a href="/notifications/">알림<span class="dot" data-notif-dot hidden></span></a>
    <a href="/settings/account/">설정</a>
  </nav>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
