name = "boardlab-studio"
compatibility_date = "2026-07-01"
pages_build_output_dir = "."

# Cloudflare Pages 환경변수 예시
# SUPABASE_URL = "https://xxxx.supabase.co"
# SUPABASE_ANON_KEY = "public-anon-key"
# SUPABASE_SERVICE_ROLE_KEY = "service-role-key"
# APP_SECRET = "32자 이상 랜덤 문자열"
# TURNSTILE_SECRET_KEY = "선택"

# AI 기본 동작: GPT 우선 사용, 크레딧/빌링/쿼터 제한 시 Gemini로 자동 전환
# OPENAI_API_KEY = "Cloudflare Pages 환경변수에 설정"
# OPENAI_MODEL = "gpt-4.1-mini"
# GEMINI_API_KEY = "Cloudflare Pages 환경변수에 설정"
# GEMINI_MODEL = "gemini-2.0-flash"
# AI_MAX_OUTPUT_TOKENS = "900"
# AI_TEMPERATURE = "0.7"

# 선택: 기존 자체 AI 프록시를 유지하고 싶을 때만 사용
# AI_ENDPOINT = "선택: 자체 AI 프록시 엔드포인트"
# AI_API_KEY = "선택: 자체 AI 프록시 키"
